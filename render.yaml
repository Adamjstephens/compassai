services:
  - type: web
    name: compassai-api
    runtime: python
    rootDir: compassai/api
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: COMPASSAI_JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: COMPASSAI_FREE_HOSTING_MODE
        value: "true"
      - key: MAX_FILE_MB
        value: "250"
      - key: MAX_DAILY_AUDIO_MINUTES_PER_USER
        value: "300"
      - key: MAX_CONCURRENT_JOBS_PER_USER
        value: "2"
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
